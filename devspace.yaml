version: v2beta1
name: domrank

deployments:
  domrank:
    helm:
      values:
        containers:
          - image: username/app

dev:
  domrank:
    imageSelector: username/app
    devImage: ghcr.io/domrank/domrank-dev:latest
    command:
    - sleep
    - infinity
    workingDir: /go/src/domrank
    ssh:
      localHostname: domrank.devspace
      useInclude: true
    ports:
      - port: 9000:9000
      - port: 5173:5173
    sync:
      - path: ./:/go/src/domrank
      - path: "${DEVSPACE_USER_HOME}/.gitconfig:/root/.gitconfig"
        file: true
        disableDownload: true
    proxyCommands:
      - gitCredentials: true
      - command: devspace
      - command: kubectl
      - command: helm
