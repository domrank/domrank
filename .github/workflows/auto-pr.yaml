name: Auto PR

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create pull request when missing
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const base = context.payload.repository.default_branch || "main";

            if (branch === base) {
              core.info(`Skipping default branch: ${base}`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${branch}`;
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              core.info(`Open PR already exists: #${existing.data[0].number}`);
              return;
            }

            const fallbackTitle = branch
              .split("/")
              .pop()
              .replace(/[-_]+/g, " ");
            const commitTitle = (context.payload.head_commit?.message || "")
              .trim()
              .split("\n")[0];
            const title = commitTitle || fallbackTitle || `Update ${branch}`;
            const body = [
              "## Summary",
              `Automated PR from \`${branch}\` into \`${base}\`.`,
              "",
              `Latest commit: \`${context.sha.slice(0, 7)}\``,
            ].join("\n");

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base,
              body,
              draft: /^(draft|wip)\//i.test(branch),
            });

            core.info(`Created PR #${pr.data.number}`);
